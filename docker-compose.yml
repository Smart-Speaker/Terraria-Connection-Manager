services:
  terraria-connection-logger:
    build: .
    image: terraria-connection-logger
    container_name: terraria-connection-logger
    restart: unless-stopped

    environment:
      # The ONLY setting you need to change: your Terraria container's NAME
      # (recommended) or ID. The name is stable; an ID like 8ec2734d585e
      # changes whenever the Terraria container is recreated/updated.
      #
      # Everything else (log path, console output, retry/join timing) uses
      # sensible defaults baked into the image. To override an advanced
      # default, add it here, e.g. RETRY_SECONDS: "30".
      TERRARIA_CONTAINER: "terraria"

    volumes:
      # Required so this container can read logs from the Terraria container.
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Where logs are saved on Unraid.
      - /mnt/user/appdata/terraria-connection-logger/logs:/logs
